<style>

#gestureText{

position:fixed;

left:50%;

top:18%;

transform:translateX(-50%);

font-size:55px;

font-weight:700;

color:white;

text-shadow:
0 0 30px hotpink;

transition:.3s;

z-index:999;

}

#love3d{

position:fixed;

left:50%;

top:50%;

font-size:100px;

transform:
translate(-50%,-50%)
rotateX(20deg);

opacity:0;

transition:.5s;

filter:
drop-shadow(
0 0 40px #ff3ea5
);

}

</style>

<div id="gestureText">
💖
</div>

<div id="love3d">
❤️
</div>

<script>

const txt=
document.getElementById(
"gestureText"
);

const heart=
document.getElementById(
"love3d"
);

hands.onResults((res)=>{

if(
!res.multiHandLandmarks.length
){

heart.style.opacity=0;

return;

}

const h=
res.multiHandLandmarks[0];

const tip=h[8];

love.style.left=
(window.innerWidth-
tip.x*
window.innerWidth)
+"px";

love.style.top=
(tip.y*
window.innerHeight)
+"px";

const d=(a,b)=>

Math.hypot(
a.x-b.x,
a.y-b.y
);

const pinch=
d(h[4],h[8]);

const peace=
h[8].y<h[6].y
&&
h[12].y<h[10].y
&&
h[16].y>h[14].y;

const open=

h[8].y<h[6].y
&&
h[12].y<h[10].y
&&
h[16].y<h[14].y
&&
h[20].y<h[18].y;

const fist=

h[8].y>h[6].y
&&
h[12].y>h[10].y;

if(open){

txt.innerHTML=
"LOVE 3D";

heart.style.opacity=1;

heart.style.transform=
`
translate(-50%,-50%)
rotateY(
${Date.now()/20}deg
)
scale(1.2)
`;

}

else if(peace){

txt.innerHTML=
"I LOVE YOU ✌️";

document.body.style.filter=
"brightness(1.1)";

}

else if(pinch<0.05){

txt.innerHTML=
"💥 LOVE";

explodeLove(

window.innerWidth/2,

window.innerHeight/2

);

}

else if(fist){

txt.innerHTML=
"💔";

heart.style.opacity=.2;

}

else{

txt.innerHTML=
"💖";

heart.style.opacity=0;

}

});

setInterval(()=>{

heart.style.transform=

`
translate(-50%,-50%)
rotateY(
${Date.now()/25}deg
)
rotateX(20deg)
`;

},30);

</script>
